<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <!-- Capture password-recovery intent from the URL hash BEFORE the Supabase client (detectSessionInUrl) consumes and clears it, so /auth can show the reset form instead of bouncing to the dashboard. -->
    <script>try{window.__HF_PASSWORD_RECOVERY=/[#&]type=recovery/.test(window.location.hash);}catch(e){}</script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5" />
    <link rel="alternate icon" href="/favicon.ico?v=5" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=5" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=5" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=5" />
    <link rel="manifest" href="/site.webmanifest?v=5" />

    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#0a0f0d" />

    <!-- Brand fonts: Fraunces (display) + Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HireFlow" />
    
    <!-- MS Tile (Windows) -->
    <meta name="msapplication-TileColor" content="#0a2019" />
    <title>HireFlow - The Future of Hiring</title>
    <meta name="description" content="HireFlow - AI-powered hiring platform that automates your entire recruitment workflow" />
    <meta name="author" content="HireFlow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="HireFlow - The Future of Hiring" />
    <meta property="og:description" content="AI-powered hiring platform that automates your entire recruitment workflow. Screen candidates, conduct AI interviews, and make better hiring decisions faster." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hireflownow.com" />
    <meta property="og:site_name" content="HireFlow" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HireFlow - The Future of Hiring" />
    <meta name="twitter:description" content="AI-powered hiring platform that automates your entire recruitment workflow." />
    
    <!-- Additional SEO -->
    <meta name="keywords" content="hiring, recruitment, AI interviews, candidate screening, HR software, applicant tracking" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hireflownow.com" />
    <!-- Natively JS SDK for native app bridge (push notifications, etc.) -->
    <script>function nativelyOnLoad() { window.nativelyLoaded = true; }</script>
    <script async onload="nativelyOnLoad()" src="https://cdn.jsdelivr.net/npm/natively@2.20.0/natively-frontend.min.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
